<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ECD</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  background: #0a0a0a;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}

.rotate-hint {
  display: none;
  position: fixed; inset: 0;
  background: #0a0a0a;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  z-index: 200;
}
.rotate-hint .arrow { font-size: 28px; color: rgba(42,122,42,0.35); }
.rotate-hint span { font-size: 10px; color: rgba(42,122,42,0.45); letter-spacing: 2px; }

@media (orientation: portrait) {
  .rotate-hint { display: flex; }
  #device { display: none; }
}

#device {
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
}

.dev-header {
  background: #111;
  padding: 5px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #1a1a1a;
  flex-shrink: 0;
  height: 30px;
}
.header-left { display: flex; gap: 6px; align-items: center; }
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: #1a3a1a; box-shadow: 0 0 3px #0f0; }
.dev-label { font-size: 8px; color: #1a4a1a; letter-spacing: 1px; }
.dev-center {
  font-size: 8px; color: #1a3a1a; letter-spacing: 0.8px;
  max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.header-right { display: flex; align-items: center; gap: 10px; }

#offset-input {
  width: 36px; background: transparent; border: none;
  border-bottom: 0.5px solid #1a4a1a; outline: none;
  font-family: 'Courier New', monospace; font-size: 9px;
  color: #2a7a2a; text-align: center; padding: 1px 0;
}
#offset-input:focus { color: #4aff4a; border-bottom-color: #4aff4a; }

#timer-btn {
  font-size: 9px; color: #2a8a2a; cursor: pointer;
  padding: 2px 8px; border: 0.5px solid #1a4a1a;
  border-radius: 3px; background: none; letter-spacing: 0.5px;
  min-width: 50px; text-align: center;
}
#timer-btn.running { color: #4aff4a; border-color: #2a8a2a; }

#cc-display {
  flex: 1;
  padding: 0 18px;
  display: flex; flex-direction: column;
  justify-content: center; gap: 6px;
  overflow: hidden;
}

.cc-line {
  font-size: clamp(13px, 2.8vw, 20px);
  line-height: 1.45;
  min-height: 1.45em;
  letter-spacing: 0.3px;
}

.dev-footer {
  background: #0a0a0a;
  padding: 3px 14px 8px;
  display: flex; justify-content: space-between;
  flex-shrink: 0;
  border-top: 1px solid #0f0f0f;
}
.dev-footer span { font-size: 7px; color: #0f2a0f; letter-spacing: 0.5px; }

/* loading state */
#loading {
  position: fixed; inset: 0; background: #0a0a0a;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; z-index: 300;
}
#loading span { font-size: 9px; color: #1a4a1a; letter-spacing: 2px; }
#loading.hidden { display: none; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
.typing-cursor { animation: blink 0.8s infinite; }
</style>
</head>
<body>

<div id="loading">
  <span id="loading-text">LOADING</span>
</div>

<div class="rotate-hint">
  <div class="arrow">⟳</div>
  <span>横屏使用</span>
</div>

<div id="device" style="display:none;">
  <div class="dev-header">
    <div class="header-left">
      <div class="live-dot"></div>
      <span class="dev-label">CC LIVE</span>
    </div>
    <span class="dev-center" id="film-label">CAPTION DEVICE</span>
    <div class="header-right">
      <input id="offset-input" type="text" value="0:00" inputmode="numeric" />
      <div id="timer-btn" onclick="toggleTimer()">▶ 0:00</div>
    </div>
  </div>

  <div id="cc-display">
    <div class="cc-line" id="line0" style="color:#2a5a2a;"></div>
    <div class="cc-line" id="line1" style="color:#3a8a3a;"></div>
    <div class="cc-line" id="line2" style="color:#4aff4a;text-shadow:0 0 10px rgba(74,255,74,0.2);"></div>
  </div>

  <div class="dev-footer">
    <span>ECD · SÉANCE</span>
    <span id="next-cue">—</span>
    <span>EIA-608</span>
  </div>
</div>

<script>
const REPO = 'https://raw.githubusercontent.com/fewwwest/seance/main';
const lineEls = [
  document.getElementById('line0'),
  document.getElementById('line1'),
  document.getElementById('line2'),
];
const COLORS = ['#2a5a2a', '#3a8a3a', '#4aff4a'];
const SHADOWS = ['none', 'none', '0 0 10px rgba(74,255,74,0.2)'];

let movieConfig = null, pendingCues = [];
let running = false, offsetSecs = 0, timerStart = null, timerInterval = null;
const lineBuf = ['', '', ''];

async function init() {
  const params = new URLSearchParams(location.search);
  const film = params.get('film');

  if (!film) {
    document.getElementById('loading-text').textContent = 'NO FILM';
    return;
  }

  try {
    const url = REPO + '/films/' + film + '.json';
    const res = await fetch(url);
    if (!res.ok) throw new Error('not found');
    movieConfig = await res.json();
    pendingCues = [...(movieConfig.eiri||[])].sort((a,b) => a.at - b.at);
    document.getElementById('film-label').textContent = movieConfig.title || 'CAPTION DEVICE';
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('device').style.display = 'flex';
    updateDisplay();
  } catch(e) {
    document.getElementById('loading-text').textContent = 'NOT FOUND';
  }
}

function parseTime(s) {
  const p = s.trim().split(':');
  return p.length === 2 ? (parseInt(p[0])||0)*60 + (parseInt(p[1])||0) : parseInt(s)||0;
}
function formatTime(s) {
  s = Math.max(0, s);
  return Math.floor(s/60) + ':' + (Math.floor(s%60) < 10 ? '0' : '') + Math.floor(s%60);
}
function currentSecs() {
  return running ? offsetSecs + (Date.now() - timerStart) / 1000 : offsetSecs;
}

function updateDisplay() {
  const btn = document.getElementById('timer-btn');
  btn.textContent = (running ? '⏸ ' : '▶ ') + formatTime(currentSecs());
  btn.className = running ? 'running' : '';
  checkCues();
  document.getElementById('next-cue').textContent = pendingCues[0] ? formatTime(pendingCues[0].at) : '—';
}

function toggleTimer() {
  if (!running) {
    offsetSecs = parseTime(document.getElementById('offset-input').value);
    timerStart = Date.now(); running = true;
    timerInterval = setInterval(updateDisplay, 500);
  } else {
    offsetSecs = currentSecs(); running = false;
    clearInterval(timerInterval);
    document.getElementById('offset-input').value = formatTime(offsetSecs);
  }
  updateDisplay();
}

const oi = document.getElementById('offset-input');
oi.addEventListener('blur', () => {
  offsetSecs = parseTime(oi.value);
  oi.value = formatTime(offsetSecs);
  updateDisplay();
});

function checkCues() {
  if (!pendingCues.length) return;
  const now = currentSecs();
  pendingCues.filter(c => c.at <= now).forEach(c => {
    pendingCues = pendingCues.filter(x => x !== c);
    showCue(c.line);
  });
}

function showCue(text) {
  lineEls[2].textContent = '▋';
  lineEls[2].className = 'cc-line typing-cursor';
  setTimeout(() => {
    lineEls[2].className = 'cc-line';
    lineBuf.shift(); lineBuf.push(text);
    render();
  }, 500);
}

function render() {
  lineEls.forEach((el, i) => {
    el.textContent = lineBuf[i] || '';
    el.style.color = COLORS[i];
    el.style.textShadow = SHADOWS[i];
  });
}

init();
</script>
</body>
</html>
