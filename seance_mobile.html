<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>ECD</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  background: #0a0a0a;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}

#device {
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
}

.dev-header {
  background: #111;
  padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #1a1a1a;
  flex-shrink: 0;
  height: 44px;
}
.header-left { display: flex; gap: 8px; align-items: center; }
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #1a3a1a; box-shadow: 0 0 4px #0f0;
  flex-shrink: 0;
}
.dev-label { font-size: 11px; color: #1a4a1a; letter-spacing: 1px; }
.dev-center {
  font-size: 12px; color: #1a3a1a; letter-spacing: 0.8px;
  flex: 1; text-align: center;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding: 0 12px;
}
.header-right {
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}

#offset-input {
  width: 52px;
  background: transparent; border: none;
  border-bottom: 1px solid #1a4a1a; outline: none;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  color: #2a7a2a; text-align: center; padding: 4px 2px;
  -webkit-appearance: none;
}
#offset-input:focus { color: #4aff4a; border-bottom-color: #4aff4a; }

#timer-btn {
  font-size: 12px; color: #2a8a2a;
  padding: 6px 10px;
  border: 0.5px solid #1a4a1a;
  border-radius: 3px; background: none;
  letter-spacing: 0.5px;
  min-width: 72px; text-align: center;
  cursor: pointer;
  -webkit-user-select: none;
}
#timer-btn.running { color: #4aff4a; border-color: #2a8a2a; }

#cc-display {
  flex: 1;
  padding: 16px 20px;
  display: flex; flex-direction: column;
  justify-content: center; gap: 8px;
  overflow: hidden;
}

.cc-line {
  font-size: clamp(15px, 3vw, 22px);
  line-height: 1.5;
  min-height: 1.5em;
  letter-spacing: 0.3px;
}

.dev-footer {
  background: #0a0a0a;
  padding: 5px 16px 10px;
  display: flex; justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  border-top: 1px solid #0f0f0f;
}
.dev-footer span { font-size: 9px; color: #0f2a0f; letter-spacing: 0.5px; }

#loading {
  position: fixed; inset: 0; background: #0a0a0a;
  display: flex; align-items: center; justify-content: center;
  z-index: 300;
}
#loading span { font-size: 10px; color: #1a4a1a; letter-spacing: 2px; }
#loading.hidden { display: none; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
.typing-cursor { animation: blink 0.8s infinite; }
</style>
</head>
<body>

<div id="loading">
  <span id="loading-text">LOADING</span>
</div>

<div id="device" style="display:none;">
  <div class="dev-header">
    <div class="header-left">
      <div class="live-dot"></div>
      <span class="dev-label">CC LIVE</span>
    </div>
    <span class="dev-center" id="film-label">CAPTION DEVICE</span>
    <div class="header-right">
      <input id="offset-input" type="text" value="0:00" inputmode="decimal" placeholder="0:00" />
      <div id="timer-btn" onclick="toggleTimer()">[ RUN ]</div>
    </div>
  </div>

  <div id="cc-display">
    <div class="cc-line" id="line0" style="color:#2a5a2a;"></div>
    <div class="cc-line" id="line1" style="color:#3a8a3a;"></div>
    <div class="cc-line" id="line2" style="color:#4aff4a;text-shadow:0 0 10px rgba(74,255,74,0.2);"></div>
  </div>

  <div class="dev-footer">
    <span>ECD · SEANCE</span>
    <span id="next-cue">NEXT --:--</span>
    <span>EIA-608</span>
  </div>
</div>

<script>
const REPO = 'https://raw.githubusercontent.com/fewwwest/seance/main';
const lineEls = [
  document.getElementById('line0'),
  document.getElementById('line1'),
  document.getElementById('line2'),
];
const COLORS = ['#2a5a2a', '#3a8a3a', '#4aff4a'];
const SHADOWS = ['none', 'none', '0 0 10px rgba(74,255,74,0.2)'];

let movieConfig = null, pendingCues = [];
let running = false, offsetSecs = 0, timerStart = null, timerInterval = null;
const lineBuf = ['', '', ''];

async function init() {
  const params = new URLSearchParams(location.search);
  const film = params.get('film');
  if (!film) { document.getElementById('loading-text').textContent = 'NO FILM'; return; }
  try {
    const res = await fetch(REPO + '/films/' + film + '.json');
    if (!res.ok) throw new Error();
    movieConfig = await res.json();
    pendingCues = [...(movieConfig.eiri||[])].sort((a,b) => a.at - b.at);
    document.getElementById('film-label').textContent = movieConfig.title || 'CAPTION DEVICE';
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('device').style.display = 'flex';
    updateDisplay();
  } catch(e) {
    document.getElementById('loading-text').textContent = 'NOT FOUND';
  }
}

function parseTime(s) {
  const p = s.trim().split(':');
  return p.length === 2 ? (parseInt(p[0])||0)*60 + (parseInt(p[1])||0) : parseInt(s)||0;
}
function formatTime(s) {
  s = Math.max(0, s);
  return Math.floor(s/60) + ':' + (Math.floor(s%60) < 10 ? '0' : '') + Math.floor(s%60);
}
function currentSecs() {
  return running ? offsetSecs + (Date.now() - timerStart) / 1000 : offsetSecs;
}

function updateDisplay() {
  const btn = document.getElementById('timer-btn');
  const t = formatTime(currentSecs());
  btn.textContent = running ? '[ ' + t + ' ]' : '[ RUN ]';
  btn.className = running ? 'running' : '';
  checkCues();
  const next = pendingCues[0];
  document.getElementById('next-cue').textContent = next ? 'NEXT ' + formatTime(next.at) : 'NEXT --:--';
}

function toggleTimer() {
  if (!running) {
    offsetSecs = parseTime(document.getElementById('offset-input').value);
    timerStart = Date.now(); running = true;
    timerInterval = setInterval(updateDisplay, 500);
  } else {
    offsetSecs = currentSecs(); running = false;
    clearInterval(timerInterval);
    document.getElementById('offset-input').value = formatTime(offsetSecs);
  }
  updateDisplay();
}

const oi = document.getElementById('offset-input');
oi.addEventListener('blur', () => {
  offsetSecs = parseTime(oi.value);
  oi.value = formatTime(offsetSecs);
  updateDisplay();
});

function checkCues() {
  if (!pendingCues.length) return;
  const now = currentSecs();
  pendingCues.filter(c => c.at <= now).forEach(c => {
    pendingCues = pendingCues.filter(x => x !== c);
    showCue(c.line);
  });
}

function showCue(text) {
  lineEls[2].textContent = '|';
  lineEls[2].className = 'cc-line typing-cursor';
  setTimeout(() => {
    lineEls[2].className = 'cc-line';
    lineBuf.shift(); lineBuf.push(text);
    render();
  }, 500);
}

function render() {
  lineEls.forEach((el, i) => {
    el.textContent = lineBuf[i] || '';
    el.style.color = COLORS[i];
    el.style.textShadow = SHADOWS[i];
    el.className = 'cc-line';
  });
}

init();
</script>
</body>
</html>
